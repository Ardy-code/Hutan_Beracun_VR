<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <title>Scene 2 - Panorama Hutan Beracun</title>

    <script src="js/aframe.min.js"></script>
    <script src="js/components.js"></script>
</head>

<body>

<a-scene>

    <!-- ASSET PANORAMA -->

    <a-assets>
        <img id="sky360" src="assets/panorama.jpg">
    </a-assets>

    <!-- BACKGROUND 360 -->

    <a-sky src="#sky360"></a-sky>

    <!-- JUDUL SCENE -->

    <a-text
        value="Scene 2 : Panorama Hutan Beracun"
        color="#FFD700"
        position="-3 4 -6"
        width="8">
    </a-text>

    <!-- HOTSPOT A -->

    <a-sphere
        id="hotspot1"
        color="#39FF14"
        radius="0.3"
        position="-3 1.6 -5"
        class="clickable"

        animation="
        property: position;
        to: -3 2.1 -5;
        dir: alternate;
        dur: 2000;
        loop: true;">
    </a-sphere>

    <a-text
        value="Jamur Glowing"
        color="#39FF14"
        position="-3 2.7 -5"
        width="4"
        align="center"
        look-at-camera>
    </a-text>

    <!-- HOTSPOT B -->

    <a-sphere
        id="hotspot2"
        color="#9B59B6"
        radius="0.3"
        position="3 1.6 -5"
        class="clickable"

        animation="
        property: position;
        to: 3 2.1 -5;
        dir: alternate;
        dur: 2300;
        loop: true;">
    </a-sphere>

    <a-text
        value="Kolam Racun"
        color="#9B59B6"
        position="3 2.7 -5"
        width="4"
        align="center"
        look-at-camera>
    </a-text>

    <!-- HOTSPOT C -->

    <a-sphere
        id="hotspot3"
        color="#1E8449"
        radius="0.3"
        position="0 1.6 -8"
        class="clickable"

        animation="
        property: position;
        to: 0 2.1 -8;
        dir: alternate;
        dur: 2500;
        loop: true;">
    </a-sphere>

    <a-text
        value="Pohon Kuno"
        color="#1E8449"
        position="0 2.7 -8"
        width="4"
        align="center"
        look-at-camera>
    </a-text>

    <!-- HOTSPOT D (LATIHAN 3) -->

    <a-sphere
        id="hotspot4"
        color="#FF4500"
        radius="0.3"
        position="-6 2 -7"
        class="clickable"

        animation="
        property: position;
        to: -6 2.5 -7;
        dir: alternate;
        dur: 1800;
        loop: true;">
    </a-sphere>

    <a-text
        value="Bunga Mutan"
        color="#FF4500"
        position="-6 3.2 -7"
        width="4"
        align="center"
        look-at-camera>
    </a-text>

    <!-- PANEL INFORMASI -->

    <a-entity
        id="infoPanel"
        visible="false"
        position="0 3 -4">

        <a-plane
            width="5"
            height="2"
            color="#000000"
            opacity="0.85">
        </a-plane>

        <a-text
            id="infoText"
            value=""
            color="#FFFFFF"
            width="4.5"
            align="center"
            position="0 0 0.01">
        </a-text>

    </a-entity>

    <!-- PORTAL KEMBALI -->

    <a-link
        href="index.html"
        title="Kembali ke Scene 1"
        position="8 2 -8"
        class="clickable">
    </a-link>

    <!-- CAMERA -->

    <a-camera position="0 1.6 0">

        <!-- PETUNJUK HOTSPOT -->

        <a-entity position="0 -0.8 -2">

            <a-plane
                width="3.8"
                height="0.6"
                color="#000000"
                opacity="0.7">
            </a-plane>

            <a-text
                value="Tatap hotspot selama 1.5 detik"
                color="#FFFFFF"
                align="center"
                width="4"
                position="0 0 0.01">
            </a-text>

        </a-entity>

        <a-cursor
            color="#FFFFFF"
            fuse="true"
            fuse-timeout="1500"
            raycaster="objects: .clickable">
        </a-cursor>

    </a-camera>

</a-scene>

<script>

const panel = document.querySelector("#infoPanel");
const infoText = document.querySelector("#infoText");

let hideTimer;

function tampilInfo(teks){

    infoText.setAttribute("value", teks);

    panel.setAttribute("visible", true);

    clearTimeout(hideTimer);

    hideTimer = setTimeout(() => {

        panel.setAttribute("visible", false);

    }, 3500);
}

document.querySelector("#hotspot1")
.addEventListener("click", () => {

    tampilInfo(
        "Jamur Glowing\n\nJamur bercahaya hijau yang tumbuh di area beracun."
    );

});

document.querySelector("#hotspot2")
.addEventListener("click", () => {

    tampilInfo(
        "Kolam Racun\n\nKolam berwarna ungu dengan kandungan racun tinggi."
    );

});

document.querySelector("#hotspot3")
.addEventListener("click", () => {

    tampilInfo(
        "Pohon Kuno\n\nPohon tertua yang dipercaya menjaga Hutan Beracun."
    );

});

document.querySelector("#hotspot4")
.addEventListener("click", () => {

    tampilInfo(
        "Bunga Mutan\n\nTanaman langka yang menghasilkan racun kuat."
    );

});

</script>

</body>
</html>
